name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Arabic Fonts
        run: |
          FONT_DIR="app/src/main/res/font"
          mkdir -p "$FONT_DIR"
          
          # Download fonts from Google Fonts GitHub repo (static versions)
          echo "Downloading Amiri Regular..."
          curl -L --retry 3 -o "$FONT_DIR/amiri_regular.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/amiri/Amiri-Regular.ttf" || \
            { echo "FAILED: Amiri Regular"; exit 1; }
          
          echo "Downloading Amiri Bold..."
          curl -L --retry 3 -o "$FONT_DIR/amiri_bold.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/amiri/Amiri-Bold.ttf" || \
            { echo "FAILED: Amiri Bold"; exit 1; }
          
          echo "Downloading Cairo Regular..."
          curl -L --retry 3 -o "$FONT_DIR/cairo_regular.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/cairo/static/Cairo-Regular.ttf" || \
            { echo "FAILED: Cairo Regular trying variable..."; \
              curl -L --retry 3 -o "$FONT_DIR/cairo_regular.ttf" \
                "https://raw.githubusercontent.com/google/fonts/main/ofl/cairo/Cairo-Regular.ttf" || \
              { echo "FAILED: Cairo Regular"; exit 1; }; }
          
          echo "Downloading Cairo Bold..."
          curl -L --retry 3 -o "$FONT_DIR/cairo_bold.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/cairo/static/Cairo-Bold.ttf" || \
            { echo "FAILED: Cairo Bold trying variable..."; \
              curl -L --retry 3 -o "$FONT_DIR/cairo_bold.ttf" \
                "https://raw.githubusercontent.com/google/fonts/main/ofl/cairo/Cairo-Bold.ttf" || \
              { echo "FAILED: Cairo Bold"; exit 1; }; }
          
          echo "Downloading Scheherazade New Regular..."
          curl -L --retry 3 -o "$FONT_DIR/scheherazade_new_regular.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/scheherazadenew/static/ScheherazadeNew-Regular.ttf" || \
            { echo "FAILED: Scheherazade Regular trying variable..."; \
              curl -L --retry 3 -o "$FONT_DIR/scheherazade_new_regular.ttf" \
                "https://raw.githubusercontent.com/google/fonts/main/ofl/scheherazadenew/ScheherazadeNew-Regular.ttf" || \
              { echo "FAILED: Scheherazade Regular"; exit 1; }; }
          
          echo "Downloading Scheherazade New Bold..."
          curl -L --retry 3 -o "$FONT_DIR/scheherazade_new_bold.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/scheherazadenew/static/ScheherazadeNew-Bold.ttf" || \
            { echo "FAILED: Scheherazade Bold trying variable..."; \
              curl -L --retry 3 -o "$FONT_DIR/scheherazade_new_bold.ttf" \
                "https://raw.githubusercontent.com/google/fonts/main/ofl/scheherazadenew/ScheherazadeNew-Bold.ttf" || \
              { echo "FAILED: Scheherazade Bold"; exit 1; }; }
          
          echo "All fonts downloaded successfully:"
          ls -la "$FONT_DIR/"
          echo "File count: $(ls -1 "$FONT_DIR/" | wc -l)"

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
          gradle-version: "8.5"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuraanTeacher-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
