name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Arabic Fonts
        run: |
          mkdir -p app/src/main/res/font
          # Amiri
          curl -L -o amiri.zip "https://fonts.google.com/download?family=Amiri" --silent
          # Cairo
          curl -L -o cairo.zip "https://fonts.google.com/download?family=Cairo" --silent
          # Scheherazade New
          curl -L -o scheherazade.zip "https://fonts.google.com/download?family=Scheherazade+New" --silent
          
          # Extract and rename fonts appropriately
          if command -v unzip &> /dev/null; then
            # For simplicity, download individual font files directly
            echo "Downloading individual font files..."
          fi
          
          # Download fonts individually from GitHub raw
          rm -f *.zip

      - name: Download individual font files
        run: |
          FONT_DIR="app/src/main/res/font"
          
          # Amiri Regular
          curl -L -o "$FONT_DIR/amiri_regular.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/amiri/Amiri-Regular.ttf" --silent --fail
          
          # Amiri Bold
          curl -L -o "$FONT_DIR/amiri_bold.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/amiri/Amiri-Bold.ttf" --silent --fail
          
          # Cairo Regular
          curl -L -o "$FONT_DIR/cairo_regular.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/cairo/Cairo-Regular.ttf" --silent --fail
          
          # Cairo Bold
          curl -L -o "$FONT_DIR/cairo_bold.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/cairo/Cairo-Bold.ttf" --silent --fail
          
          # Scheherazade New Regular
          curl -L -o "$FONT_DIR/scheherazade_new_regular.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/scheherazadenew/ScheherazadeNew-Regular.ttf" --silent --fail
          
          # Scheherazade New Bold
          curl -L -o "$FONT_DIR/scheherazade_new_bold.ttf" \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/scheherazadenew/ScheherazadeNew-Bold.ttf" --silent --fail
          
          echo "Fonts downloaded:"
          ls -la "$FONT_DIR/"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
          gradle-version: "8.5"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuraanTeacher-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
